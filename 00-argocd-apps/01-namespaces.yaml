apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 01-setup-namespaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10" # Run this first!
spec:
  project: default
  source:
    repoURL: https://github.com/thescouser89/gitops-play
    path: 01-infrastructure/namespaces
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false          # Deleting a file in /apps does notdelete the App in Argo
      selfHeal: true

