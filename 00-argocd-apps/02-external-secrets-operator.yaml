apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 02-external-secrets-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10" # Run this first
spec:
  project: default
  source:
    repoURL: 'https://charts.external-secrets.io'
    chart: external-secrets
    targetRevision: 0.9.11  # Use the latest stable version
    helm:
      releaseName: external-secrets
      parameters:
        - name: installCRDs
          value: "true"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
