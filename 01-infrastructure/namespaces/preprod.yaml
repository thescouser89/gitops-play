# Operator namespaces

# Application namespaces
# Label needed when running on Openshift so that the argocd admin user can
# do changes to the namespaces when deploying apps
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    argocd.argoproj.io/managed-by=openshift-gitops  # needed for Openshift
  name: devel
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    argocd.argoproj.io/managed-by=openshift-gitops  # needed for Openshift
  name: stage
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    argocd.argoproj.io/managed-by=openshift-gitops  # needed for Openshift
  name: prod
