apiVersion: v1
kind: Namespace
metadata:
  labels:
    openshift.io/cluster-monitoring: "true"
    argocd.argoproj.io/managed-by: openshift-gitops  # needed for Openshift
  name: amq-streams
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: amq-streams-operatorgroup
  namespace: amq-streams
spec:
  targetNamespaces:
    - amq-streams
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: amq-streams
  namespace: amq-streams
spec:
  # oc get packagemanifest amq-streams -n openshift-marketplace -o jsonpath='{.status.channels[*].name}'
  channel: stable
  name: amq-streams
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
