# Argocd will run in the openshift-gitops namespace
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-gitops-operator
  namespace: openshift-operators
spec:
  channel: latest                 # Can also specify a specific version also
  installPlanApproval: Automatic  # Can also set it to Manual for Prod
  name: openshift-gitops-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
